# Publishes the Docker image.

name: Docker GHCR Build and Push

on:
  workflow_call:
    inputs:
      rust-binary-name:
        description: 'Name of the binary to build'
        required: true
        type: string
      rust-channel:
        description: 'Rust channel to use (stable, beta, nightly, or specific version like 1.70.0)'
        required: false
        default: 'stable'
        type: string
      requires-private-deps:
        description: 'Requires private dependencies to be fetched (prefers GitHub App token, falls back to SSH key)'
        required: false
        default: false
        type: boolean
      dockerfile-path:
        description: 'Dockerfile to use'
        required: false
        default: 'Dockerfile'
        type: string
      build-flags:
        description: 'Build flags to pass to cargo'
        required: false
        type: string
        default: ''
      require-lockfile:
        description: 'Require a Cargo.lock file to be present (--locked)'
        required: false
        default: false
        type: boolean
      version-tag:
        description: 'Version tag to apply to the image (e.g., 1.0.1). If empty, only sha/branch tags are applied.'
        required: false
        default: ''
        type: string
    secrets:
      APP_ID:
        description: 'GitHub App ID for fetching private dependencies (preferred)'
        required: false
      APP_PRIVATE_KEY:
        description: 'GitHub App private key for fetching private dependencies (preferred)'
        required: false
      SSH_PRIVATE_KEY:
        description: 'SSH private key for fetching private dependencies (fallback)'
        required: false

env:
  CARGO_TERM_COLOR: always
  REGISTRY_IMAGE: ghcr.io/${{ github.repository }}/${{ inputs.rust-binary-name }}

jobs:
  build:
    name: Build & Push (${{ inputs.rust-channel }})
    runs-on:
      group: ${{ matrix.runner }}
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: big-bois-x86
          - arch: arm64
            platform: linux/arm64
            runner: big-bois-aarch64
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: ${{ inputs.requires-private-deps != true }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ inputs.rust-channel }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ inputs.rust-channel }}-docker-${{ matrix.arch }}-${{ inputs.require-lockfile }}
      - name: Install Docker CE
        run: |
          sudo apt update
          sudo apt install ca-certificates curl
          sudo install -m 0755 -d /etc/apt/keyrings
          sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc

          sudo tee /etc/apt/sources.list.d/docker.sources <<EOF
          Types: deb
          URIs: https://download.docker.com/linux/ubuntu
          Suites: $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}")
          Components: stable
          Signed-By: /etc/apt/keyrings/docker.asc
          EOF

          sudo apt update
          sudo apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
          sudo systemctl start docker
          sudo systemctl enable docker
          sudo usermod -aG docker $USER
          sudo chmod 666 /var/run/docker.sock
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-${{ matrix.arch }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-buildx-
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Detect auth method for private deps
        if: ${{ inputs.requires-private-deps == true }}
        id: auth
        shell: bash
        env:
          HAS_APP_ID: ${{ secrets.APP_ID }}
          HAS_APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          HAS_SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -n "$HAS_APP_ID" ] && [ -n "$HAS_APP_PRIVATE_KEY" ]; then
            echo "method=app" >> "$GITHUB_OUTPUT"
          elif [ -n "$HAS_SSH_KEY" ]; then
            echo "method=ssh" >> "$GITHUB_OUTPUT"
          else
            echo "::error::requires-private-deps is true but neither APP_ID/APP_PRIVATE_KEY nor SSH_PRIVATE_KEY is set"
            exit 1
          fi
      - name: Generate GitHub App token
        if: ${{ steps.auth.outputs.method == 'app' }}
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: Setup ssh-agent (fallback)
        if: ${{ steps.auth.outputs.method == 'ssh' }}
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Build and push
        if: ${{ steps.auth.outputs.method != 'ssh' }}
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: ${{ matrix.platform }}
          context: .
          file: ${{ inputs.dockerfile-path }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          tags: ${{ env.REGISTRY_IMAGE }}:${{ github.sha }}
          secrets: ${{ steps.auth.outputs.method == 'app' && format('git_auth_token={0}', steps.app-token.outputs.token) || '' }}
          build-args: |
            RUST_TOOLCHAIN=${{ inputs.rust-channel }}
            BUILD_FLAGS=${{ inputs.build-flags }} ${{ inputs.require-lockfile == true && '--locked' || '' }}
      - name: Build and push (SSH fallback)
        if: ${{ steps.auth.outputs.method == 'ssh' }}
        id: build-and-push-ssh
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: ${{ matrix.platform }}
          context: .
          file: ${{ inputs.dockerfile-path }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          tags: ${{ env.REGISTRY_IMAGE }}:${{ github.sha }}
          ssh: default
          build-args: |
            RUST_TOOLCHAIN=${{ inputs.rust-channel }}
            BUILD_FLAGS=${{ inputs.build-flags }} ${{ inputs.require-lockfile == true && '--locked' || '' }}
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
      - name: Export digest
        id: export-digest
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest || steps.build-and-push-ssh.outputs.digest }}
          ARCH: ${{ matrix.arch }}
        run: |
          if [ "$ARCH" = "amd64" ]; then
            echo "digest-amd64=$DIGEST" >> $GITHUB_OUTPUT
            echo "digest-arm64=" >> $GITHUB_OUTPUT
          else
            echo "digest-amd64=" >> $GITHUB_OUTPUT
            echo "digest-arm64=$DIGEST" >> $GITHUB_OUTPUT
          fi
    outputs:
      digest-amd64: ${{ steps.export-digest.outputs.digest-amd64 }}
      digest-arm64: ${{ steps.export-digest.outputs.digest-arm64 }}
  publish-manifest-list:
    name: Publish Docker manifest list
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Docker Metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable=${{ inputs.version-tag != '' }}
            type=raw,value=${{ inputs.version-tag }},enable=${{ inputs.version-tag != '' }}
      - name: Create and push manifest list
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            ${{ env.REGISTRY_IMAGE }}@${{ needs.build.outputs.digest-amd64 }} \
            ${{ env.REGISTRY_IMAGE }}@${{ needs.build.outputs.digest-arm64 }}
