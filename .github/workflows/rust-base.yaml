name: 'Rust Base CI'
on:
  workflow_call:
    inputs:
      rust-channel:
        description: 'Rust channel to use (stable, beta, nightly, or specific version like 1.70.0)'
        required: false
        default: 'stable'
        type: string
      install-foundry:
        description: 'Installs foundry as a pre-test step'
        required: false
        default: false
        type: boolean
      require-lockfile:
        description: 'Require a Cargo.lock file to be present (--locked)'
        required: false
        default: false
        type: boolean
      requires-private-deps:
        description: 'Requires private dependencies to be fetched (prefers GitHub App token, falls back to SSH key)'
        required: false
        default: false
        type: boolean
      rust-profile:
        description: 'The profile to give to cargo for running, defaults to dev'
        required: false
        default: 'dev'
        type: string
      dind:
        description: 'Use a DIND runner'
        required: false
        default: false
        type: boolean
      submodules:
        description: 'Updates git submodules recursively'
        required: false
        default: false
        type: boolean
      feature-sets:
        description: 'JSON array of feature flag strings for cargo test, clippy, and docs (e.g., "", "--all-features")'
        required: false
        default: '[""]' # Default to checking only default features
        type: string
      foundry-command:
        description: 'Shell command to run after installing Foundry (e.g., "forge build --root contracts"). Does nothing if empty.'
        required: false
        default: ''
        type: string # Corrected type
      runner:
        description: 'Runner to use (e.g. big-bois-x86 for custom group runner, ubuntu-latest or macos-latest for GitHub runners)'
        required: false
        default: ''
        type: string
      runner-group:
        description: 'Runner group to use for GitHub-hosted custom groups'
        required: false
        default: ''
        type: string
      install-dapp-dependencies:
        description: 'Whether to install dapp dependencies'
        required: false
        default: false
        type: boolean
      test-args:
        description: 'Additional CLI arguments to pass to cargo test command'
        required: false
        default: ''
        type: string
      use-nextest:
        description: 'Use cargo nextest instead of cargo test for running tests'
        required: false
        default: false
        type: boolean
      cache-include-cargo-files:
        description: 'Whether to include the Cargo toml and lock file in the cache key'
        required: false
        default: false
        type: boolean
      cache-save-branch-name:
        description: 'The name of the branch to save the cache to'
        required: false
        default: 'main'
        type: string
      deny-checks:
        description: 'Cargo deny checks: advisories, licenses, bans, sources, all, or space-separated combo. Leave empty to skip.'
        required: false
        default: ''
        type: string
      foundry-preinstalled:
        description: 'Skip foundry-toolchain install step (assumes the runner already has foundry on PATH). Has no effect when install-foundry is false.'
        required: false
        default: false
        type: boolean
      nextest-preinstalled:
        description: 'Skip cargo-nextest install step (assumes the runner already has nextest on PATH). Has no effect when use-nextest is false.'
        required: false
        default: false
        type: boolean
      zepter-preinstalled:
        description: 'Skip zepter install step (assumes the runner already has zepter on PATH). Has no effect when enable-zepter is false.'
        required: false
        default: false
        type: boolean
      deny-preinstalled:
        description: 'Skip cargo-deny install (runs `cargo deny check` directly). Assumes the runner already has cargo-deny on PATH. Has no effect when deny-checks is empty.'
        required: false
        default: false
        type: boolean
      enable-zepter:
        description: 'Enable zepter feature-propagation lint. Requires a zepter config in the calling repo (e.g. .config/zepter.yaml).'
        required: false
        default: false
        type: boolean
      enable-sccache:
        description: 'Enable sccache for faster compilation caching across CI runs'
        required: false
        default: false
        type: boolean
      sccache-backend:
        description: 'sccache backend: "gha" uses GitHub Actions cache, "local" relies on runner .env (for self-hosted runners with local disk cache)'
        required: false
        default: 'gha'
        type: string
    secrets:
      APP_ID:
        description: 'GitHub App ID for fetching private dependencies (preferred)'
        required: false
      APP_PRIVATE_KEY:
        description: 'GitHub App private key for fetching private dependencies (preferred)'
        required: false
      SSH_PRIVATE_KEY:
        description: 'SSH private key for fetching private dependencies (fallback)'
        required: false
jobs:
  test:
    name: Test (${{ inputs.rust-channel }})
    runs-on: ${{ inputs.runner-group != '' && fromJSON(format('{{"group":"{0}"}}', inputs.runner-group)) || inputs.runner != '' && inputs.runner || 'ubuntu-latest' }}
    timeout-minutes: 8
    env:
      SCCACHE_GHA_ENABLED: ${{ inputs.enable-sccache == true && inputs.sccache-backend == 'gha' && 'true' || 'false' }}
      RUSTC_WRAPPER: ${{ inputs.enable-sccache == true && inputs.sccache-backend == 'gha' && 'sccache' || '' }}
      CARGO_INCREMENTAL: ${{ inputs.enable-sccache == true && inputs.sccache-backend == 'gha' && '0' || '' }}
    strategy:
      fail-fast: false
      matrix:
        feature-set: ${{ fromJSON(inputs.feature-sets) }}
    services:
      docker:
        image: ${{ inputs.dind && 'docker:dind' || '' }}
        options: ${{ inputs.dind && '--privileged --shm-size=2g' || '--name noop' }}
        volumes: ${{ inputs.dind && fromJSON('["/var/run/docker.sock:/var/run/docker.sock:ro"]') || fromJSON('[]') }}
    steps:
      - name: Detect auth method for private deps
        if: ${{ inputs.requires-private-deps == true }}
        id: auth
        shell: bash
        env:
          HAS_APP_ID: ${{ secrets.APP_ID }}
          HAS_APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          HAS_SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -n "$HAS_APP_ID" ] && [ -n "$HAS_APP_PRIVATE_KEY" ]; then
            echo "method=app" >> "$GITHUB_OUTPUT"
          elif [ -n "$HAS_SSH_KEY" ]; then
            echo "method=ssh" >> "$GITHUB_OUTPUT"
          else
            echo "::error::requires-private-deps is true but neither APP_ID/APP_PRIVATE_KEY nor SSH_PRIVATE_KEY is set"
            exit 1
          fi
      - name: Generate GitHub App token
        if: ${{ steps.auth.outputs.method == 'app' }}
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: Setup ssh-agent (fallback)
        if: ${{ steps.auth.outputs.method == 'ssh' }}
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: false  # Important: Don't fetch submodules yet
          persist-credentials: ${{ inputs.requires-private-deps != true }}
      - name: Configure Git for private deps
        if: ${{ inputs.requires-private-deps == true }}
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ "${{ steps.auth.outputs.method }}" = "app" ]; then
            git config --global url."https://x-access-token:${GH_APP_TOKEN}@github.com/".insteadOf "https://github.com/"
          else
            git config --global --unset-all url.https://github.com/.insteadOf || echo "No HTTPS config to unset"
            git config --global url."git@github.com:".insteadOf "https://github.com/"
          fi
      - name: Install submodules
        if: ${{ inputs.submodules == true }}
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        if: ${{ inputs.install-dapp-dependencies }}
        with:
          version: 8
          run_install: false
      - name: Install dapp dependencies
        if: ${{ inputs.install-dapp-dependencies }}
        run: |
          pnpm install -g next
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-channel }}
      - name: Setup sccache
        if: ${{ inputs.enable-sccache == true && inputs.sccache-backend == 'gha' }}
        uses: mozilla-actions/sccache-action@v0.0.10

      - name: Install cargo-nextest
        if: ${{ inputs.use-nextest == true && inputs.nextest-preinstalled != true }}
        uses: taiki-e/install-action@nextest

      - name: Optional Foundry Install
        if: ${{ inputs.install-foundry == true && inputs.foundry-preinstalled != true }}
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      # --- Run Optional Foundry Command ---
      - name: Run Foundry Command
        # Only run if foundry was installed AND a command was provided
        if: ${{ inputs.install-foundry == true && inputs.foundry-command != '' }}
        run: ${{ inputs.foundry-command }}

      - name: Run tests (${{ matrix.feature-set || 'default' }})
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        run: |
          if [ "${{ inputs.use-nextest }}" = "true" ]; then
            cargo nextest run --workspace ${{ inputs.require-lockfile == true && '--locked' || '' }} ${{ matrix.feature-set }} ${{ inputs.test-args }}
          else
            cargo test --workspace ${{ inputs.require-lockfile == true && '--locked' || '' }} ${{ matrix.feature-set }} ${{ inputs.test-args }}
          fi
      - name: Show sccache stats
        if: ${{ inputs.enable-sccache == true }}
        run: sccache --show-stats

  rustfmt:
    name: Format (${{ inputs.rust-channel }})
    runs-on: ${{ inputs.runner-group != '' && fromJSON(format('{{"group":"{0}"}}', inputs.runner-group)) || inputs.runner != '' && inputs.runner || 'ubuntu-latest' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-channel }}
          components: rustfmt
      - name: Check formatting
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        run: cargo fmt --all --check

  clippy:
    name: Clippy (${{ inputs.rust-channel }})
    runs-on: ${{ inputs.runner-group != '' && fromJSON(format('{{"group":"{0}"}}', inputs.runner-group)) || inputs.runner != '' && inputs.runner || 'ubuntu-latest' }}
    timeout-minutes: 15
    env:
      SCCACHE_GHA_ENABLED: ${{ inputs.enable-sccache == true && inputs.sccache-backend == 'gha' && 'true' || 'false' }}
      RUSTC_WRAPPER: ${{ inputs.enable-sccache == true && inputs.sccache-backend == 'gha' && 'sccache' || '' }}
      CARGO_INCREMENTAL: ${{ inputs.enable-sccache == true && inputs.sccache-backend == 'gha' && '0' || '' }}
    strategy:
      fail-fast: false
      matrix:
        feature-set: ${{ fromJSON(inputs.feature-sets) }}
    steps:
      - name: Detect auth method for private deps
        if: ${{ inputs.requires-private-deps == true }}
        id: auth
        shell: bash
        env:
          HAS_APP_ID: ${{ secrets.APP_ID }}
          HAS_APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          HAS_SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -n "$HAS_APP_ID" ] && [ -n "$HAS_APP_PRIVATE_KEY" ]; then
            echo "method=app" >> "$GITHUB_OUTPUT"
          elif [ -n "$HAS_SSH_KEY" ]; then
            echo "method=ssh" >> "$GITHUB_OUTPUT"
          else
            echo "::error::requires-private-deps is true but neither APP_ID/APP_PRIVATE_KEY nor SSH_PRIVATE_KEY is set"
            exit 1
          fi
      - name: Generate GitHub App token
        if: ${{ steps.auth.outputs.method == 'app' }}
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: Setup ssh-agent (fallback)
        if: ${{ steps.auth.outputs.method == 'ssh' }}
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: ${{ inputs.requires-private-deps != true }}
      - name: Configure Git for private deps
        if: ${{ inputs.requires-private-deps == true }}
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ "${{ steps.auth.outputs.method }}" = "app" ]; then
            git config --global url."https://x-access-token:${GH_APP_TOKEN}@github.com/".insteadOf "https://github.com/"
          else
            git config --global --unset-all url.https://github.com/.insteadOf || echo "No HTTPS config to unset"
            git config --global url."git@github.com:".insteadOf "https://github.com/"
          fi
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-channel }}
          components: clippy
      - name: Setup sccache
        if: ${{ inputs.enable-sccache == true && inputs.sccache-backend == 'gha' }}
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: Clippy check (${{ matrix.feature-set || 'default' }})
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        run: |
          cargo clippy --all-targets --workspace ${{ inputs.require-lockfile == true && '--locked' || '' }} ${{ matrix.feature-set }} --profile ${{ inputs.rust-profile }} -- -D warnings -D clippy::pedantic
      - name: Show sccache stats
        if: ${{ inputs.enable-sccache == true }}
        run: sccache --show-stats

  cargo-shear:
    name: Cargo shear (${{ inputs.rust-channel }})
    runs-on: ${{ inputs.runner-group != '' && fromJSON(format('{{"group":"{0}"}}', inputs.runner-group)) || inputs.runner != '' && inputs.runner || 'ubuntu-latest' }}
    timeout-minutes: 5
    steps:
      - name: Detect auth method for private deps
        if: ${{ inputs.requires-private-deps == true }}
        id: auth
        shell: bash
        env:
          HAS_APP_ID: ${{ secrets.APP_ID }}
          HAS_APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          HAS_SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -n "$HAS_APP_ID" ] && [ -n "$HAS_APP_PRIVATE_KEY" ]; then
            echo "method=app" >> "$GITHUB_OUTPUT"
          elif [ -n "$HAS_SSH_KEY" ]; then
            echo "method=ssh" >> "$GITHUB_OUTPUT"
          else
            echo "::error::requires-private-deps is true but neither APP_ID/APP_PRIVATE_KEY nor SSH_PRIVATE_KEY is set"
            exit 1
          fi
      - name: Generate GitHub App token
        if: ${{ steps.auth.outputs.method == 'app' }}
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: Setup ssh-agent (fallback)
        if: ${{ steps.auth.outputs.method == 'ssh' }}
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Checkout sources
        uses: actions/checkout@v7
        with:
          persist-credentials: ${{ inputs.requires-private-deps != true }}
      - name: Configure Git for private deps
        if: ${{ inputs.requires-private-deps == true }}
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ "${{ steps.auth.outputs.method }}" = "app" ]; then
            git config --global url."https://x-access-token:${GH_APP_TOKEN}@github.com/".insteadOf "https://github.com/"
          else
            git config --global --unset-all url.https://github.com/.insteadOf || echo "No HTTPS config to unset"
            git config --global url."git@github.com:".insteadOf "https://github.com/"
          fi
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # v1.20.1
      - name: Install cargo-shear
        run: cargo binstall --no-confirm cargo-shear
      - name: Run cargo shear
        run: |
          if [ "${{ inputs.requires-private-deps }}" = "true" ]; then
            export CARGO_NET_GIT_FETCH_WITH_CLI=true
          fi
          cargo shear

  cargo-deny:
    name: Cargo deny (${{ inputs.rust-channel }})
    if: ${{ inputs.deny-checks != '' }}
    runs-on: ${{ inputs.runner-group != '' && fromJSON(format('{{"group":"{0}"}}', inputs.runner-group)) || inputs.runner != '' && inputs.runner || 'ubuntu-latest' }}
    timeout-minutes: 5
    steps:
      - name: Detect auth method for private deps
        if: ${{ inputs.requires-private-deps == true }}
        id: auth
        shell: bash
        env:
          HAS_APP_ID: ${{ secrets.APP_ID }}
          HAS_APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          HAS_SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -n "$HAS_APP_ID" ] && [ -n "$HAS_APP_PRIVATE_KEY" ]; then
            echo "method=app" >> "$GITHUB_OUTPUT"
          elif [ -n "$HAS_SSH_KEY" ]; then
            echo "method=ssh" >> "$GITHUB_OUTPUT"
          else
            echo "::error::requires-private-deps is true but neither APP_ID/APP_PRIVATE_KEY nor SSH_PRIVATE_KEY is set"
            exit 1
          fi
      - name: Generate GitHub App token
        if: ${{ steps.auth.outputs.method == 'app' }}
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: Setup ssh-agent (fallback)
        if: ${{ steps.auth.outputs.method == 'ssh' }}
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: ${{ inputs.requires-private-deps != true }}
      - name: Configure Git for private deps
        if: ${{ inputs.requires-private-deps == true }}
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ "${{ steps.auth.outputs.method }}" = "app" ]; then
            git config --global url."https://x-access-token:${GH_APP_TOKEN}@github.com/".insteadOf "https://github.com/"
          else
            git config --global --unset-all url.https://github.com/.insteadOf || echo "No HTTPS config to unset"
            git config --global url."git@github.com:".insteadOf "https://github.com/"
          fi
      - name: Run cargo-deny (preinstalled)
        if: ${{ inputs.deny-preinstalled == true }}
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        run: cargo deny check ${{ inputs.deny-checks }}
      - name: Run cargo-deny (action)
        if: ${{ inputs.deny-preinstalled != true }}
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check ${{ inputs.deny-checks }}
        env:
          DOCKER_BUILDKIT: 0

  zepter:
    name: Feature propagation (zepter)
    if: ${{ inputs.enable-zepter == true }}
    runs-on: ${{ inputs.runner-group != '' && fromJSON(format('{{"group":"{0}"}}', inputs.runner-group)) || inputs.runner != '' && inputs.runner || 'ubuntu-latest' }}
    timeout-minutes: 10
    steps:
      - name: Detect auth method for private deps
        if: ${{ inputs.requires-private-deps == true }}
        id: auth
        shell: bash
        env:
          HAS_APP_ID: ${{ secrets.APP_ID }}
          HAS_APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          HAS_SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -n "$HAS_APP_ID" ] && [ -n "$HAS_APP_PRIVATE_KEY" ]; then
            echo "method=app" >> "$GITHUB_OUTPUT"
          elif [ -n "$HAS_SSH_KEY" ]; then
            echo "method=ssh" >> "$GITHUB_OUTPUT"
          else
            echo "::error::requires-private-deps is true but neither APP_ID/APP_PRIVATE_KEY nor SSH_PRIVATE_KEY is set"
            exit 1
          fi
      - name: Generate GitHub App token
        if: ${{ steps.auth.outputs.method == 'app' }}
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: Setup ssh-agent (fallback)
        if: ${{ steps.auth.outputs.method == 'ssh' }}
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: ${{ inputs.requires-private-deps != true }}
      - name: Configure Git for private deps
        if: ${{ inputs.requires-private-deps == true }}
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ "${{ steps.auth.outputs.method }}" = "app" ]; then
            git config --global url."https://x-access-token:${GH_APP_TOKEN}@github.com/".insteadOf "https://github.com/"
          else
            git config --global --unset-all url.https://github.com/.insteadOf || echo "No HTTPS config to unset"
            git config --global url."git@github.com:".insteadOf "https://github.com/"
          fi
      - name: Install submodules
        if: ${{ inputs.submodules == true }}
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-channel }}
      - name: Install cargo-binstall
        if: ${{ inputs.zepter-preinstalled != true }}
        uses: cargo-bins/cargo-binstall@732870f031d2fb36309d0deaf36abcc704a7be65 # v1.20.1
      - name: Install zepter
        if: ${{ inputs.zepter-preinstalled != true }}
        run: cargo binstall --no-confirm zepter
      - name: Run zepter
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        run: zepter run check

  docs:
    name: Docs (${{ inputs.rust-channel }})
    runs-on: ${{ inputs.runner-group != '' && fromJSON(format('{{"group":"{0}"}}', inputs.runner-group)) || inputs.runner != '' && inputs.runner || 'ubuntu-latest' }}
    timeout-minutes: 10
    env:
      SCCACHE_GHA_ENABLED: ${{ inputs.enable-sccache == true && inputs.sccache-backend == 'gha' && 'true' || 'false' }}
      RUSTC_WRAPPER: ${{ inputs.enable-sccache == true && inputs.sccache-backend == 'gha' && 'sccache' || '' }}
      CARGO_INCREMENTAL: ${{ inputs.enable-sccache == true && inputs.sccache-backend == 'gha' && '0' || '' }}
    strategy:
      fail-fast: false
      matrix:
        feature-set: ${{ fromJSON(inputs.feature-sets) }}
    steps:
      - name: Detect auth method for private deps
        if: ${{ inputs.requires-private-deps == true }}
        id: auth
        shell: bash
        env:
          HAS_APP_ID: ${{ secrets.APP_ID }}
          HAS_APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
          HAS_SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -n "$HAS_APP_ID" ] && [ -n "$HAS_APP_PRIVATE_KEY" ]; then
            echo "method=app" >> "$GITHUB_OUTPUT"
          elif [ -n "$HAS_SSH_KEY" ]; then
            echo "method=ssh" >> "$GITHUB_OUTPUT"
          else
            echo "::error::requires-private-deps is true but neither APP_ID/APP_PRIVATE_KEY nor SSH_PRIVATE_KEY is set"
            exit 1
          fi
      - name: Generate GitHub App token
        if: ${{ steps.auth.outputs.method == 'app' }}
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: Setup ssh-agent (fallback)
        if: ${{ steps.auth.outputs.method == 'ssh' }}
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: ${{ inputs.requires-private-deps != true }}
      - name: Configure Git for private deps
        if: ${{ inputs.requires-private-deps == true }}
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ "${{ steps.auth.outputs.method }}" = "app" ]; then
            git config --global url."https://x-access-token:${GH_APP_TOKEN}@github.com/".insteadOf "https://github.com/"
          else
            git config --global --unset-all url.https://github.com/.insteadOf || echo "No HTTPS config to unset"
            git config --global url."git@github.com:".insteadOf "https://github.com/"
          fi
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-channel }}
      - name: Setup sccache
        if: ${{ inputs.enable-sccache == true && inputs.sccache-backend == 'gha' }}
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: Check documentation (${{ matrix.feature-set || 'default' }})
        env:
          RUSTDOCFLAGS: -D warnings
          CARGO_NET_GIT_FETCH_WITH_CLI: true
        run: |
          cargo doc --no-deps --document-private-items --workspace --examples ${{ inputs.require-lockfile == true && '--locked' || '' }} ${{ matrix.feature-set }} --profile ${{ inputs.rust-profile }}
      - name: Show sccache stats
        if: ${{ inputs.enable-sccache == true }}
        run: sccache --show-stats
