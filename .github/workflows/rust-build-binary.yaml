name: Build Rust Binary

on:
  workflow_call:
    inputs:
      # Inputs for building
      binary-name:
        description: "Name of the binary to release"
        required: true
        type: string
      version:
        description: "Version of the binary to release"
        required: true
        type: string
      rust-channel:
        description: "Rust channel to use (stable, beta, nightly, or specific version like 1.70.0)"
        required: false
        default: "stable"
        type: string
      artifact_name:
        description: "Name of the artifact to upload"
        required: false
        default: "binaries"
        type: string
      package:
        description: "Name of the package/crate to build (for monorepos)"
        required: false
        type: string
      manifest-path:
        description: "Path to Cargo.toml if not in root (e.g., 'crates/my-crate/Cargo.toml')"
        required: false
        type: string
      enable-sccache:
        description: "Enable sccache for faster compilation caching across CI runs"
        required: false
        default: false
        type: boolean
      cargo-features:
        description: "Cargo features to enable (comma-separated, e.g., 'full' or 'feat1,feat2'). Passed via --features."
        required: false
        default: ""
        type: string
      no-default-features:
        description: "Pass --no-default-features to cargo build"
        required: false
        default: false
        type: boolean
      requires-private-deps:
        description: "Requires private dependencies to be fetched, sets up ssh-agent"
        required: false
        default: false
        type: boolean
    secrets:
      SSH_PRIVATE_KEY:
        description: "SSH private key for private git dependencies"
        required: false
permissions:
  contents: read

jobs:
  build:
    name: Build Binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os: linux
            arch: x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            os: linux
            arch: arm64
          - runner: macos-latest
            target: aarch64-apple-darwin
            os: macos
            arch: arm64
    runs-on: ${{ matrix.runner }}
    env:
      SCCACHE_GHA_ENABLED: ${{ inputs.enable-sccache == true && 'true' || '' }}
      RUSTC_WRAPPER: ${{ inputs.enable-sccache == true && 'sccache' || '' }}
      CARGO_INCREMENTAL: ${{ inputs.enable-sccache == true && '0' || '' }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          toolchain: ${{ inputs.rust-channel }}
      - name: Setup sccache
        if: ${{ inputs.enable-sccache == true }}
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: Setup ssh-agent
        if: ${{ inputs.requires-private-deps == true }}
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Configure Git for SSH
        if: ${{ inputs.requires-private-deps == true }}
        run: |
          # Remove the HTTPS conversion that actions/checkout added
          git config --global --unset-all url.https://github.com/.insteadOf || echo "No HTTPS config to unset"

          # Configure Git to use SSH for GitHub URLs
          git config --global url."git@github.com:".insteadOf "https://github.com/"
      - name: Verify SSH key (fail fast on misconfigured deploy key)
        if: ${{ inputs.requires-private-deps == true }}
        run: |
          # Fail fast if SSH auth to GitHub is broken, before attempting any cargo fetch.
          # Note: ssh -T to git@github.com ALWAYS exits non-zero (GitHub closes the shell
          # session), so we can't let `set -e` short-circuit. We allow the command to "fail"
          # via `|| status=$?` so we can inspect the exit code explicitly.
          # Output is discarded to avoid echoing key fingerprints.
          status=0
          ssh -o StrictHostKeyChecking=accept-new -T git@github.com 2>/dev/null || status=$?
          # Exit status 1 means successful auth (GitHub's expected response for `ssh -T`).
          # Exit status 255 typically means auth failure (no valid key, wrong key, etc.).
          if [ "$status" -ne 1 ]; then
            echo "::error::SSH authentication to GitHub failed (exit status $status). Check that SSH_PRIVATE_KEY is set and valid."
            exit 1
          fi
      - name: Cargo Build Release
        run: |
          # Build command with optional package and manifest path
          BUILD_CMD="cargo build --release --target ${{ matrix.target }} --locked"

          # Add package flag if specified
          if [ -n "${{ inputs.package }}" ]; then
            BUILD_CMD="$BUILD_CMD --package ${{ inputs.package }}"
          fi

          # Add manifest path if specified
          if [ -n "${{ inputs.manifest-path }}" ]; then
            BUILD_CMD="$BUILD_CMD --manifest-path ${{ inputs.manifest-path }}"
          fi

          # Add --no-default-features if requested
          if [ "${{ inputs.no-default-features }}" = "true" ]; then
            BUILD_CMD="$BUILD_CMD --no-default-features"
          fi

          # Add --features if specified
          if [ -n "${{ inputs.cargo-features }}" ]; then
            BUILD_CMD="$BUILD_CMD --features ${{ inputs.cargo-features }}"
          fi

          echo "Running $BUILD_CMD"
          $BUILD_CMD
      - name: Create artifacts directory
        run: mkdir -p artifacts
      - name: Tarball Binaries
        run: |
          # Create a directory with the binary name to have a consistent structure in the tarball
          mkdir -p ${{ inputs.binary-name }}
          cp target/${{ matrix.target }}/release/${{ inputs.binary-name }} ${{ inputs.binary-name }}/
          tar -czf ${{ inputs.binary-name }}-${{ inputs.version }}-${{ matrix.os}}-${{ matrix.arch }}.tar.gz ${{ inputs.binary-name }}
      - name: Copy tarball to artifacts directory
        run: cp ${{ inputs.binary-name }}-${{ inputs.version }}-${{ matrix.os}}-${{ matrix.arch }}.tar.gz artifacts/
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}-${{ matrix.os }}-${{ matrix.arch }}
          path: artifacts/
          retention-days: 1

  upload-artifacts:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ inputs.artifact_name }}-*
          path: artifacts/
      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name }}
          path: artifacts/
          retention-days: 1
